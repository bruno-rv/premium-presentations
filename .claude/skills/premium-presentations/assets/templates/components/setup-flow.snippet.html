<!-- Horizontal setup / activation steps -->

      <p class="setup-step__badge">Step 1</p>

      <p class="setup-step__badge">Step 3</p>
      <p class="setup-step__title">Memory</p>

    <div class="setup-flow__arrow" aria-hidden="true">→</div>
    <div class="setup-step">
      <p class="setup-step__badge">Step 4</p>
