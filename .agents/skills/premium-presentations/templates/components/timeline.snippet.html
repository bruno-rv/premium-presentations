<!-- Horizontal timeline — 3 milestones -->
<section class="slide">
  <p class="slide__label reveal">Timeline</p>
  <h2 class="slide__heading reveal">Three eras</h2>
  <div class="content-center-wrap">
    <div class="timeline-grid reveal">
      <div class="tl-col">
        <div class="tl-dot" style="border-color:var(--accent)"></div>
        <p class="tl-year" style="color:var(--accent)">2022</p>
        <p class="tl-title">Label one</p>
        <p class="tl-desc">Short italic hook.</p>
        <div class="tl-detail"><strong>Detail:</strong> one concrete fact.</div>
        <span class="tl-stat">stat</span>
      </div>
      <div class="tl-col">
        <div class="tl-dot" style="border-color:var(--gold)"></div>
        <p class="tl-year" style="color:var(--gold)">2024</p>
        <p class="tl-title">Label two</p>
        <p class="tl-desc">Short italic hook.</p>
        <div class="tl-detail"><strong>Detail:</strong> one concrete fact.</div>
        <span class="tl-stat">stat</span>
      </div>
      <div class="tl-col">
        <div class="tl-dot" style="border-color:var(--orange)"></div>
        <p class="tl-year" style="color:var(--orange)">2026</p>
        <p class="tl-title">Label three</p>
        <p class="tl-desc">Short italic hook.</p>
        <div class="tl-detail"><strong>Detail:</strong> one concrete fact.</div>
        <span class="tl-stat">stat</span>
      </div>
    </div>
  </div>
</section>
