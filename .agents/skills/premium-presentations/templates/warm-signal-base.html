<!DOCTYPE html>
<html lang="en" data-theme="warm" data-parallax="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;600;700&family=Alegreya+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{SHARED}}premium-themes.css">
<link rel="stylesheet" href="{{SHARED}}premium-deck.css">
<link rel="stylesheet" href="{{SHARED}}premium-components.css">
<link rel="stylesheet" href="{{SHARED}}premium-diagrams.css">
<link rel="stylesheet" href="{{SHARED}}premium-annotations.css">
<link rel="stylesheet" href="{{SHARED}}premium-extras.css">
<meta property="og:type" content="article">
<meta property="og:title" content="{{TITLE}}">
<meta property="og:description" content="Premium Presentations deck">
<meta property="og:image" content="og-cover.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{TITLE}}">
</head>
<body>
<div class="deck" id="deck">

<!-- SLIDE 1 - TITLE -->
<section class="slide slide--title" data-nav-title="{{TITLE}}">
  <p class="slide__subtitle reveal">Warm Signal</p>
  <h1 class="slide__display reveal">{{TITLE}}</h1>
  <p class="slide__body reveal" style="margin-top:1rem;text-align:center">Use this surface for RAG, pipelines, diagrams, and teaching decks.</p>
</section>

<!-- SLIDE 2 - CONTENT -->
<section class="slide" data-nav-title="First idea">
  <p class="slide__label reveal">Section</p>
  <h2 class="slide__heading reveal">First content slide</h2>
  <p class="slide__body reveal">Replace slides and add more sections. Use shared components and run validation when done.</p>
</section>

</div>
<script src="{{SHARED}}premium-controller.js" defer></script>
<script src="{{SHARED}}premium-controls.js" defer></script>
<script src="{{SHARED}}premium-annotations.js" defer></script>
<script src="{{SHARED}}premium-timer.js" defer></script>
<script src="{{SHARED}}premium-tts.js" defer></script>
<script src="{{SHARED}}premium-search.js" defer></script>
<script src="{{SHARED}}premium-clicker.js" defer></script>
<script src="{{SHARED}}premium-og-cover.js" defer></script>
<script src="{{SHARED}}premium-presenter.js" defer></script>
<script src="{{SHARED}}slide-engine.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    new SlideEngine();
  });
</script>
</body>
</html>
