<!-- Journey path — P14 (paths built by premium-journey.js from .journey-node circles) -->
<section class="slide">
  <p class="slide__label reveal">Roadmap</p>
  <h2 class="slide__heading reveal">The full journey</h2>
  <div class="content-center-wrap">
    <div class="journey-stage reveal">
      <svg viewBox="0 0 960 220" role="img" aria-label="Learning journey path" data-journey-gradient="journey-path-g" data-journey-pad="64" data-journey-duration="10s" data-journey-particles="3">
        <defs>
          <linearGradient id="journey-path-g" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="var(--red)"/>
            <stop offset="35%" stop-color="var(--gold)"/>
            <stop offset="65%" stop-color="var(--violet)"/>
            <stop offset="100%" stop-color="var(--green)"/>
          </linearGradient>
        </defs>
        <g class="journey-path-layer" aria-hidden="true"></g>
        <g class="journey-nodes">
          <circle class="journey-node" cx="100" cy="130" r="28" fill="var(--red-dim)" stroke="var(--red)" stroke-width="2"/>
          <text x="100" y="125" text-anchor="middle" class="journey-node-label" font-size="11" fill="var(--text)">START</text>
          <text x="100" y="175" text-anchor="middle" class="journey-node-label" fill="var(--red)">MindSet</text>
          <circle class="journey-node" cx="320" cy="75" r="26" fill="var(--gold-dim)" stroke="var(--gold)" stroke-width="2"/>
          <text x="320" y="70" text-anchor="middle" font-family="var(--font-mono)" font-size="10" fill="var(--text)">L1</text>
          <text x="320" y="48" text-anchor="middle" class="journey-node-label" fill="var(--gold)">Foundations</text>
          <circle class="journey-node" cx="540" cy="155" r="26" fill="var(--violet-dim)" stroke="var(--violet)" stroke-width="2"/>
          <text x="540" y="150" text-anchor="middle" font-family="var(--font-mono)" font-size="10" fill="var(--text)">L2</text>
          <text x="540" y="198" text-anchor="middle" class="journey-node-label" fill="var(--violet)">Workshops</text>
          <circle class="journey-node" cx="760" cy="85" r="26" fill="var(--green-dim)" stroke="var(--green)" stroke-width="2"/>
          <text x="760" y="80" text-anchor="middle" font-family="var(--font-mono)" font-size="10" fill="var(--text)">L3</text>
          <text x="760" y="58" text-anchor="middle" class="journey-node-label" fill="var(--green)">Bootcamps</text>
          <circle class="journey-node" cx="900" cy="115" r="22" fill="var(--accent-dim)" stroke="var(--accent)" stroke-width="2" stroke-dasharray="4 3"/>
          <text x="900" y="120" text-anchor="middle" font-family="var(--font-mono)" font-size="14" fill="var(--accent)">+</text>
          <text x="900" y="158" text-anchor="middle" class="journey-node-label" fill="var(--accent)">Community</text>
        </g>
      </svg>
    </div>
  </div>
</section>
