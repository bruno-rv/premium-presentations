<!-- Stage card — 2-column deep dive -->
<section class="slide">
  <p class="slide__label reveal">Deep dive</p>
  <div class="content-center-wrap">
    <div class="stage-card stage-card--pulse reveal" style="border-color:color-mix(in srgb, var(--gold) 35%, var(--border))">
      <div>
        <h2 class="slide__heading" style="font-size:clamp(1.5rem,3vw,2.2rem)">Stage title</h2>
        <p class="slide__body" style="margin-top:0.75rem">Two or three sentences. One idea.</p>
        <div style="margin-top:1rem;display:flex;flex-wrap:wrap;gap:0.35rem">
          <span class="tag tag-accent">tag</span>
          <span class="tag tag-gold">tag</span>
        </div>
      </div>
      <div class="stage-card__visual">
        <!-- Replace with lesson-specific SVG or mini-diagram. Keep it either
             (a) recognizable connected shapes like the circles+lines below
             (reads as "3 linked stages" even with no text), or
             (b) real visible content (a type specimen, a stat, a short
             label) if the idea is not itself a shape/flow.
             Do NOT use bordered rects/bars with no text and no connecting
             lines — unlabeled boxes read as broken/empty UI, not as a
             deliberate diagram. If neither (a) nor (b) fits, drop the
             visual column and use a single-column content slide instead. -->
        <svg viewBox="0 0 200 120" width="100%" aria-hidden="true">
          <circle cx="40" cy="60" r="22" fill="var(--accent-dim)" stroke="var(--accent)" stroke-width="2"/>
          <circle cx="100" cy="60" r="22" fill="var(--gold-dim)" stroke="var(--gold)" stroke-width="2"/>
          <circle cx="160" cy="60" r="22" fill="var(--green-dim)" stroke="var(--green)" stroke-width="2"/>
          <line x1="62" y1="60" x2="78" y2="60" stroke="var(--accent)" stroke-width="2" class="flow-r"/>
          <line x1="122" y1="60" x2="138" y2="60" stroke="var(--gold)" stroke-width="2" class="flow-r"/>
        </svg>
      </div>
    </div>
  </div>
</section>
