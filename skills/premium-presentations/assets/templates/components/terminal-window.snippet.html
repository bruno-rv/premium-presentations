<!-- Terminal mockup: macOS chrome bar + mono command output (CSS only, stays dark on light themes) -->
<section class="slide">
  <p class="slide__label reveal">Hands-on</p>
  <h2 class="slide__heading reveal">One command to start</h2>
  <div class="terminal-window reveal">
    <div class="terminal-window__bar">
      <span class="terminal-window__dot terminal-window__dot--r" aria-hidden="true"></span>
      <span class="terminal-window__dot terminal-window__dot--y" aria-hidden="true"></span>
      <span class="terminal-window__dot terminal-window__dot--g" aria-hidden="true"></span>
      <span class="terminal-window__title">zsh — pipeline</span>
    </div>
    <pre class="terminal-window__body"><span class="term-prompt">$</span> ./scripts/run_pipeline.sh --env prod
<span class="term-dim"># validating config…</span>
<span class="term-ok">✓</span> 12,480 records ingested
<span class="term-ok">✓</span> quality gates passed (6/6)</pre>
  </div>
</section>
