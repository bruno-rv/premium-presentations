<!DOCTYPE html>
<html lang="en" data-theme="{{THEME}}" data-parallax="off" data-3d="off" data-red-hero="on" data-red-bar-right="{{BAR_RIGHT}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{SHARED}}premium-themes.css">
<link rel="stylesheet" href="{{SHARED}}premium-deck.css">
<link rel="stylesheet" href="{{SHARED}}premium-components.css">
<link rel="stylesheet" href="{{SHARED}}premium-diagrams.css">
<link rel="stylesheet" href="{{SHARED}}premium-annotations.css">
<link rel="stylesheet" href="{{SHARED}}premium-extras.css">
<link rel="stylesheet" href="{{SHARED}}premium-red-brand.css">
</head>
<body>
<div class="deck" id="deck">

<!-- SLIDE 1 — TITLE -->
<section class="slide slide--title" data-nav-title="{{TITLE}}">
  <div class="slide__glow" aria-hidden="true"></div>
  <p class="slide__subtitle reveal">Subtitle / department</p>
  <h1 class="slide__display reveal">{{TITLE}}<br><span class="shimmer-gold">Headline</span></h1>
  <p class="slide__body reveal" style="margin-top:1rem;max-width:36rem;text-align:center">One-line context. Theme: <code>data-theme="red"</code>.</p>
</section>

<!-- SLIDE 2 — ACT DIVIDER -->
<section class="slide slide--divider" data-nav-title="Act 1">
  <div class="slide__number reveal" aria-hidden="true">01</div>
  <p class="slide__label reveal">Act 1</p>
  <h2 class="slide__heading reveal"><span class="shimmer-text">Section title</span></h2>
  <p class="slide__body reveal">Structured, bold, on-brand — broadcast white + red palette.</p>
</section>

<!-- SLIDE 3 — FOCUS FRAME (broadcast metadata pattern) -->
<section class="slide">
  <p class="slide__label reveal">Focus Frame</p>
  <h2 class="slide__heading reveal">On-air metadata panel</h2>
  <div class="focus-frame reveal" style="max-width:28rem;margin-top:1rem">
    <p class="slide__label" style="margin-bottom:0.5rem">Show title</p>
    <p style="font-family:var(--font-display);font-size:1.5rem;font-weight:600;line-height:1.2">Episode name</p>
    <p class="slide__body" style="margin-top:0.75rem;font-size:0.95rem">22:15 · #hashtag · Live</p>
  </div>
</section>

</div>
<script src="{{SHARED}}premium-controller.js" defer></script>
<script src="{{SHARED}}premium-controls.js" defer></script>
<script src="{{SHARED}}premium-annotations.js" defer></script>
<script src="{{SHARED}}premium-red-chrome.js" defer></script>
<script src="{{SHARED}}premium-timer.js" defer></script>
<script src="{{SHARED}}premium-tts.js" defer></script>
<script src="{{SHARED}}premium-search.js" defer></script>
<script src="{{SHARED}}premium-clicker.js" defer></script>
<script src="{{SHARED}}premium-og-cover.js" defer></script>
<script src="{{SHARED}}premium-slide-content.js" defer></script>
<script src="{{SHARED}}premium-presenter.js" defer></script>
<script src="{{SHARED}}slide-engine.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    new SlideEngine();
  });
</script>
</body>
</html>
