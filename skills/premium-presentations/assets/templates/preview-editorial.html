<!DOCTYPE html>
<html lang="en" data-theme="editorial" data-parallax="off" data-3d="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editorial Theme Preview</title>
<link rel="stylesheet" href="../shared/premium-themes.css">
<link rel="stylesheet" href="../shared/premium-deck.css">
<link rel="stylesheet" href="../shared/premium-components.css">
<link rel="stylesheet" href="../shared/premium-design-power.css">
<link rel="stylesheet" href="../shared/premium-diagrams.css">
<link rel="stylesheet" href="../shared/premium-annotations.css">
<link rel="stylesheet" href="../shared/premium-extras.css">
<style>
  body { font-family: var(--font-body); }
  .slide__display,
  .slide__heading { font-family: var(--font-display); }
  .slide__label,
  .slide__subtitle { font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="deck" id="deck">
  <section class="slide slide--title" data-nav-title="Editorial">
    <p class="slide__subtitle reveal">Theme preview</p>
    <h1 class="slide__display reveal">Editorial system</h1>
    <p class="slide__body reveal" style="margin-top:1rem">High contrast dark canvas, measured accent color, and a clear speaker-first reading order.</p>
  </section>
  <section class="slide" data-nav-title="Components">
    <p class="slide__label reveal">Components</p>
    <h2 class="slide__heading reveal">Dense material without visual noise</h2>
    <div class="kpi-row reveal">
      <div class="kpi"><div class="kpi-val">01</div><div class="kpi-lbl">Title scale</div></div>
      <div class="kpi"><div class="kpi-val">65ch</div><div class="kpi-lbl">Readable prose</div></div>
      <div class="kpi"><div class="kpi-val">44px</div><div class="kpi-lbl">Mobile tools</div></div>
    </div>
  </section>
</div>
<script src="../shared/premium-controller.js" defer></script>
<script src="../shared/premium-design-power.js" defer></script>
<script src="../shared/premium-controls.js" defer></script>
<script src="../shared/premium-annotations.js" defer></script>
<script src="../shared/premium-timer.js" defer></script>
<script src="../shared/premium-tts.js" defer></script>
<script src="../shared/premium-search.js" defer></script>
<script src="../shared/premium-clicker.js" defer></script>
<script src="../shared/premium-og-cover.js" defer></script>
<script src="../shared/premium-slide-content.js" defer></script>
<script src="../shared/premium-presenter.js" defer></script>
<script src="../shared/slide-engine.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    new SlideEngine();
  });
</script>
</body>
</html>
