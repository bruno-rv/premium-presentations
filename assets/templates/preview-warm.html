<!DOCTYPE html>
<html lang="en" data-theme="warm" data-parallax="off" data-3d="off">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warm Signal Theme Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400;600;700&family=Alegreya+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/premium-themes.css">
<link rel="stylesheet" href="../shared/premium-deck.css">
<link rel="stylesheet" href="../shared/premium-components.css">
<link rel="stylesheet" href="../shared/premium-diagrams.css">
<link rel="stylesheet" href="../shared/premium-annotations.css">
<link rel="stylesheet" href="../shared/premium-extras.css">
<style>
  body { font-family: 'Alegreya Sans', system-ui, sans-serif; }
  .slide__display,
  .slide__heading { font-family: 'Alegreya', Georgia, serif; }
  .slide__label,
  .slide__subtitle { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
</style>
</head>
<body>
<div class="deck" id="deck">
  <section class="slide slide--title" data-nav-title="Warm Signal">
    <p class="slide__subtitle reveal">Theme preview</p>
    <h1 class="slide__display reveal">Warm Signal</h1>
    <p class="slide__body reveal" style="margin-top:1rem">A low-light teaching surface for RAG, pipelines, and data diagrams.</p>
  </section>
  <section class="slide" data-nav-title="Flow">
    <p class="slide__label reveal">Flow</p>
    <h2 class="slide__heading reveal">Evidence first, decoration second</h2>
    <div class="checklist-grid reveal">
      <div class="checklist-item"><strong>Contrast</strong> Body text stays comfortably above WCAG minimums.</div>
      <div class="checklist-item"><strong>Motion</strong> Chrome animates transform and opacity, not layout.</div>
    </div>
  </section>
</div>
<script src="../shared/premium-controller.js" defer></script>
<script src="../shared/premium-controls.js" defer></script>
<script src="../shared/premium-annotations.js" defer></script>
<script src="../shared/premium-timer.js" defer></script>
<script src="../shared/premium-tts.js" defer></script>
<script src="../shared/premium-search.js" defer></script>
<script src="../shared/premium-clicker.js" defer></script>
<script src="../shared/premium-og-cover.js" defer></script>
<script src="../shared/premium-slide-content.js" defer></script>
<script src="../shared/premium-presenter.js" defer></script>
<script src="../shared/slide-engine.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    new SlideEngine();
  });
</script>
</body>
</html>
