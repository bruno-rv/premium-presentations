<script type="application/json" id="glossary">
{
  "RAG": {
    "title": "RAG — Retrieval-Augmented Generation",
    "body": "Augments an LLM with documents retrieved at query time. Chunk → embed → search → inject top results into the prompt → generate."
  },
  "LLM": {
    "title": "LLM — Large Language Model",
    "body": "A transformer-scale model trained on text to predict tokens — the generator in a RAG pipeline."
  }
}
</script>

  <h2 class="slide__heading">Vector retrieval basics</h2>
  <div class="slide__body">

      pairs an <button class="term-link" type="button" data-term="LLM">LLM</button>

    </p>
  </div>

  </aside>
</section>
