<!-- Animated bar comparison -->
<section class="slide">
  <p class="slide__label reveal">Metrics</p>
  <h2 class="slide__heading reveal">Where time actually goes</h2>
  <div class="content-center-wrap">
    <div class="bar-chart reveal">
      <div class="bar-row">
        <div class="bar-label"><span>Before</span>Manual glue work</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:80%;background:linear-gradient(90deg,var(--red),var(--orange))">80%</div>
        </div>
      </div>
      <div class="bar-row">
        <div class="bar-label"><span>After</span>Spec-driven delivery</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:35%;background:linear-gradient(90deg,var(--accent),var(--green))">35%</div>
        </div>
      </div>
    </div>
  </div>
</section>
